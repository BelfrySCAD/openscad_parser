name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ --cov=src/openscad_parser --cov-report=xml

      - name: Generate coverage badge
        if: matrix.python-version == '3.12' && github.event_name == 'push'
        run: genbadge coverage -i coverage.xml -o coverage-badge.svg

      - name: Commit coverage badge
        if: matrix.python-version == '3.12' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add coverage-badge.svg
          git diff --cached --quiet || git commit -m "Update coverage badge [skip ci]"
          git push
